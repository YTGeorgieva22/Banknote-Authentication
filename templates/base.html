<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BankNote Authentication{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fb;
            color: #111827;
        }

        .navbar {
            width: 100%;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            height: 66px;
            display: flex;
            align-items: center;
        }

        .navbar-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;

            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;

            text-decoration: none;
            color: #2563eb;
            font-size: 18px;
            font-weight: 700;
        }

        .navbar-brand svg {
            width: 30px;
            height: 30px;
            stroke: #2563eb;
        }

        .navbar-center {
            display: flex;
            align-items: center;
            gap: 36px;
        }

        .navbar-center a {
            text-decoration: none;
            color: #4b5563;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .navbar-center a:hover {
            color: #111827;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .login-link {
            text-decoration: none;
            color: #111827;
            font-size: 15px;
            font-weight: 600;
        }

        .register-btn {
            text-decoration: none;
            background: #020617;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .register-btn:hover {
            background: #111827;
        }

        .page-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        @media (max-width: 768px) {
            .navbar-container {
                padding: 0 20px;
            }

            .navbar-center {
                gap: 20px;
            }

            .page-content {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">

        <a class="navbar-brand" href="{{ url_for('main_bp.index') }}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M12 2l7 3v6c0 5-3.5 8.5-7 10-3.5-1.5-7-5-7-10V5l7-3z"/>
            </svg>
            <span>BankNote Auth</span>
        </a>

        <div class="navbar-center">
            <a href="{{ url_for('main_bp.index') }}">Home</a>
            <a href="#">About</a>
        </div>

        <div class="navbar-right">
            <a class="login-link" href="{{ url_for('auth.login') }}">Login</a>
            <a class="register-btn" href="{{ url_for('auth.register') }}">Register</a>
        </div>

    </div>
</nav>

<div class="page-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
